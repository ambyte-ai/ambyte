services:
  # ============================================================================
  # CONTROL PLANE (Management API)
  # ============================================================================
  api:
    build:
      context: ../../  # Points to repo root
      dockerfile: apps/control_plane_api/Dockerfile
    container_name: ambyte-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ambyte
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Run migrations on startup, then start the server
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn src.main:app --host 0.0.0.0 --port 8000"

  # ============================================================================
  # INGEST API (File Upload & Job Submission)
  # ============================================================================
  ingest-api:
    build:
      context: ../../ # Points to repo root to capture shared schemas/packages
      dockerfile: apps/ingest_worker/Dockerfile
      no_cache: true
    container_name: ambyte-ingest-api
    restart: always
    ports:
      - "8001:8000"
    environment:
      - AMBYTE_INGEST_QDRANT_URL=http://qdrant:6333
      - AMBYTE_INGEST_REDIS_JOB_STORE_URL=redis://redis:6379/0
      - AMBYTE_INGEST_VOYAGE_API_KEY=${VOYAGE_API_KEY}
      - AMBYTE_INGEST_OPENAI_API_KEY=${OPENAI_API_KEY}
      # MinIO / S3 Configuration
      - AMBYTE_INGEST_S3_ENDPOINT_URL=http://minio:9000
      - AMBYTE_INGEST_S3_BUCKET_NAME=ambyte-raw
      # Boto3 standard credentials (auto-discovered by SDK)
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_DEFAULT_REGION=us-east-1
      # Control Plane Integration (required by shared config)
      - AMBYTE_INGEST_CONTROL_PLANE_URL=http://api:8000
      - AMBYTE_INGEST_CONTROL_PLANE_API_KEY=${INGEST_WORKER_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uv run uvicorn ingest_worker.main:app --host 0.0.0.0 --port 8000

  # ============================================================================
  # INGEST WORKER (AI Processing Pipeline)
  # ============================================================================
  ingest-worker:
    build:
      context: ../../
      dockerfile: apps/ingest_worker/Dockerfile
    container_name: ambyte-ingest-worker
    restart: always
    environment:
      - AMBYTE_INGEST_QDRANT_URL=http://qdrant:6333
      - AMBYTE_INGEST_REDIS_JOB_STORE_URL=redis://redis:6379/0
      - AMBYTE_INGEST_VOYAGE_API_KEY=${VOYAGE_API_KEY}
      - AMBYTE_INGEST_OPENAI_API_KEY=${OPENAI_API_KEY}
      # MinIO / S3 Configuration
      - AMBYTE_INGEST_S3_ENDPOINT_URL=http://minio:9000
      - AMBYTE_INGEST_S3_BUCKET_NAME=ambyte-raw
      # Boto3 standard credentials (auto-discovered by SDK)
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_DEFAULT_REGION=us-east-1
      # Control Plane Integration
      - AMBYTE_INGEST_CONTROL_PLANE_URL=http://api:8000
      - AMBYTE_INGEST_CONTROL_PLANE_API_KEY=${INGEST_WORKER_API_KEY}
    depends_on:
      - qdrant
      - redis
      - minio
      - api
    command: uv run arq ingest_worker.worker.WorkerSettings

  # ============================================================================
  # INFRASTRUCTURE (State Stores)
  # ============================================================================
  db:
    image: postgres:15-alpine
    container_name: ambyte-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ambyte
    ports:
      - "5432:5432"
    volumes:
      - ambyte_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ambyte-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ambyte_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: ambyte-qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - ambyte_qdrant_data:/qdrant/storage

  # ============================================================================
  # OBJECT STORAGE (MinIO - S3 Compatible)
  # ============================================================================
  minio:
    image: minio/minio:latest
    container_name: ambyte-minio
    restart: always
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - ambyte_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-off job to create the default bucket ('ambyte-raw') on startup
  create-bucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/ambyte-raw --ignore-existing;
      exit 0;
      "

volumes:
  ambyte_pg_data:
  ambyte_redis_data:
  ambyte_qdrant_data:
  ambyte_minio_data: