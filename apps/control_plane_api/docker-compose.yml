services:
  db:
    image: postgres:15-alpine
    container_name: ambyte-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ambyte
    ports:
      - "5432:5432"
    volumes:
      - ambyte_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ambyte_pg_data: