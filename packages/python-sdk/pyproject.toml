[project]
name = "ambyte-sdk"
version = "0.1.0"
description = "The Python SDK for rights-aware data pipelines"
requires-python = ">=3.11"
dependencies = [
    "ambyte-schemas", # Depends on the local workspace package
    "requests>=2.32.5",
    "opentelemetry-api>=1.38.0"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
ambyte-schemas = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["ambyte"]