x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

networks:
  ambyte-net:
    driver: bridge

services:
  # ============================================================================
  # CONTROL PLANE (Management API)
  # ============================================================================
  api:
    image: ${DOCKERHUB_USERNAME:-ambyte}/ambyte-api:${TAG:-latest}
    container_name: ambyte-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-ambyte}
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ambyte-net
    logging: *default-logging
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn src.main:app --host 0.0.0.0 --port 8000"

  # ============================================================================
  # AUDIT WORKER
  # ============================================================================
  audit-worker:
    image: ${DOCKERHUB_USERNAME:-ambyte}/ambyte-audit-worker:${TAG:-latest}
    container_name: ambyte-audit-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - AMBYTE_AUDIT_REDIS_URL=redis://redis:6379/0
      - AMBYTE_AUDIT_DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ambyte}
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      # Wait for API to run Alembic migrations first
      api:
        condition: service_started
    networks:
      - ambyte-net
    logging: *default-logging

  # ============================================================================
  # INGEST API & WORKER
  # ============================================================================
  ingest-api:
    image: ${DOCKERHUB_USERNAME:-ambyte}/ambyte-ingest:${TAG:-latest}
    container_name: ambyte-ingest-api
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - AMBYTE_INGEST_QDRANT_URL=http://qdrant:6333
      - AMBYTE_INGEST_REDIS_JOB_STORE_URL=redis://redis:6379/0
      - AMBYTE_INGEST_S3_ENDPOINT_URL=http://minio:9000
      - AMBYTE_INGEST_CONTROL_PLANE_URL=http://api:8000
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ambyte-net
    logging: *default-logging
    command: uv run uvicorn ingest_worker.main:app --host 0.0.0.0 --port 8000

  ingest-worker:
    image: ${DOCKERHUB_USERNAME:-ambyte}/ambyte-ingest:${TAG:-latest}
    container_name: ambyte-ingest-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - AMBYTE_INGEST_QDRANT_URL=http://qdrant:6333
      - AMBYTE_INGEST_REDIS_JOB_STORE_URL=redis://redis:6379/0
      - AMBYTE_INGEST_S3_ENDPOINT_URL=http://minio:9000
      - AMBYTE_INGEST_CONTROL_PLANE_URL=http://api:8000
    depends_on:
      - qdrant
      - redis
      - minio
      - api
    networks:
      - ambyte-net
    logging: *default-logging
    command: uv run arq ingest_worker.worker.WorkerSettings

  # ============================================================================
  # FRONTEND (Next.js Dashboard)
  # ============================================================================
  # Builds the Next.js app locally so it can bake in the user's specific Clerk Keys
  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/v1}
        - NEXT_PUBLIC_INGEST_API_URL=${NEXT_PUBLIC_INGEST_API_URL:-http://localhost:8001}
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    container_name: ambyte-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: [ .env ]
    depends_on:
      - api
    networks:
      - ambyte-net
    logging: *default-logging

  # ============================================================================
  # INFRASTRUCTURE / DATABASES
  # ============================================================================
  db:
    image: postgres:15-alpine
    container_name: ambyte-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ambyte_pg_data:/var/lib/postgresql/data
    networks:
      - ambyte-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ambyte-redis
    restart: unless-stopped
    volumes:
      - ambyte_redis_data:/data
    networks:
      - ambyte-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: ambyte-qdrant
    restart: unless-stopped
    volumes:
      - ambyte_qdrant_data:/qdrant/storage
    networks:
      - ambyte-net

  minio:
    image: minio/minio:latest
    container_name: ambyte-minio
    restart: unless-stopped
    ports:
      - "9000:9000" # REQUIRED: UI browser directly requests PDFs from localhost:9000
    env_file:
      - .env
    environment:
      # Map .env AWS keys to MinIO's required auth variables
      - MINIO_ROOT_USER=${AWS_ACCESS_KEY_ID:-minioadmin}
      - MINIO_ROOT_PASSWORD=${AWS_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - ambyte_minio_data:/data
    networks:
      - ambyte-net
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  create-bucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - ambyte-net
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${AWS_ACCESS_KEY_ID:-minioadmin} ${AWS_SECRET_ACCESS_KEY:-minioadmin};
      /usr/bin/mc mb myminio/${AMBYTE_INGEST_S3_BUCKET_NAME:-ambyte-raw} --ignore-existing;
      /usr/bin/mc anonymous set download myminio/${AMBYTE_INGEST_S3_BUCKET_NAME:-ambyte-raw};
      exit 0;
      "

volumes:
  ambyte_pg_data:
  ambyte_redis_data:
  ambyte_qdrant_data:
  ambyte_minio_data: